<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — MoneySnap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/newstyles.css">
</head>
<body class="login-page">

    <!-- NAVBAR -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">
                <span class="brand-icon">M</span>
                MoneySnap
            </a>
        </div>
    </nav>

    <!-- LOGIN MAIN -->
    <main class="login-main">
        <div class="login-card">

            <!-- Brand mark inside card -->
            <div class="login-brand">
                <div class="login-brand-icon">M</div>
                <span class="login-brand-name">MoneySnap</span>
            </div>

            <h1 class="login-title">Bienvenido de vuelta</h1>
            <p class="login-subtitle">Ingresa tus datos para continuar</p>

            <!-- Error message (shown via JS) -->
            <div class="login-error" id="loginError">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="loginErrorMsg">Correo o contraseña incorrectos.</span>
            </div>

            <div class="login-divider"></div>

            <form class="login-form" id="loginForm">
                <div class="login-field">
                    <label class="login-label" for="email">Correo electrónico</label>
                    <input
                        class="login-input"
                        id="email"
                        type="email"
                        placeholder="tu@correo.com"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="login-field">
                    <label class="login-label" for="password">Contraseña</label>
                    <input
                        class="login-input"
                        id="password"
                        type="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <div class="login-forgot">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button class="login-submit" type="submit" onclick="login()">
                    Ingresar
                </button>
            </form>

            <p class="login-register">
                ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        /* Navbar always appears scrolled on this page */
        document.getElementById('navbar').classList.add('scrolled');

        /* Show error helper — call this from auth.js if login fails */
        function showLoginError(msg) {
            const el = document.getElementById('loginError');
            if (msg) document.getElementById('loginErrorMsg').textContent = msg;
            el.classList.add('visible');
        }
    </script>
</body>
</html>
